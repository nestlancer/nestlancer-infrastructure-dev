# ═══════════════════════════════════════════════════════════════
# Redis Cache — DEV Configuration Overrides
# Verbose logging, no password, RDB every 60s
# ═══════════════════════════════════════════════════════════════

# ── Logging ──
loglevel verbose

# ── Auth (no password for dev) ──
# requirepass is NOT set

# ── Memory ──
maxmemory 256mb
maxmemory-policy allkeys-lru

# ── Persistence (RDB every 60s if 1 key changed) ──
save ""
