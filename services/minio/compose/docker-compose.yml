# ═══════════════════════════════════════════════════════════════
# MinIO — Dev Environment Compose
# Simplified for dev-specific infrastructure
# ═══════════════════════════════════════════════════════════════
name: minio-dev

services:
  minio:
    container_name: minio-dev
    image: quay.io/minio/minio:RELEASE.2025-02-28T09-55-16Z
    env_file:
      - ../env/dev.env
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    volumes:
      - ${DATA_PATH_BASE}/minio_data:/data
    command: ["server", "/data", "--console-address", ":9001"]
    networks:
      minio_internal:
        ipv4_address: 172.20.8.2
      gateway:
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      com.project.service: "minio"
      com.project.environment: "dev"
      com.project.managed-by: "docker-compose"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  minio-init:
    container_name: minio-init-dev
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ../init/setup.sh:/setup.sh:ro
    env_file:
      - ../env/dev.env
    entrypoint: ["/bin/sh", "/setup.sh"]
    networks:
      minio_internal:
        ipv4_address: 172.20.8.3
    restart: "no"
    labels:
      com.project.service: "minio-init"
      com.project.environment: "dev"
      com.project.managed-by: "docker-compose"

networks:
  minio_internal:
    name: minio_internal_dev
    external: true
  gateway:
    name: gateway_dev_network
    external: true
