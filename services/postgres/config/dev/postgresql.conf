# ═══════════════════════════════════════════════════════════════
# PostgreSQL — DEV Configuration Overrides
# Debug logging, relaxed limits, full statement logging
# ═══════════════════════════════════════════════════════════════

# ── Logging (verbose for development) ──
log_statement = 'all'
log_duration = on
log_min_duration_statement = 0
log_connections = on
log_disconnections = on
log_lock_waits = on

# ── Development convenience ──
client_min_messages = notice
log_min_messages = info
log_min_error_statement = info

# ── Relaxed resource settings ──
# Must be >= primary max_connections (base is 100); lower values abort standby recovery.
max_connections = 100
shared_buffers = 128MB
