# ═══════════════════════════════════════════════════════════════
# PostgreSQL — Dev Environment Compose
# Simplified for dev-specific infrastructure
# ═══════════════════════════════════════════════════════════════
name: pg-dev

services:
  postgres:
    container_name: postgres-dev
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../env/dev.env
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - ${DATA_PATH_BASE}/pg_data:/var/lib/postgresql/data
      - ../config/base/postgresql.conf:/etc/postgresql/base.conf:ro
      - ../config/dev/postgresql.conf:/etc/postgresql/override.conf:ro
      - ../config/base/pg_hba.conf:/etc/postgresql/base_hba.conf:ro
      - ../config/dev/pg_hba.conf:/etc/postgresql/override_hba.conf:ro
      - ../init:/docker-entrypoint-initdb.d:ro
      - ../scripts:/usr/local/bin/scripts:ro
      - ${DATA_PATH_BASE}/pg_backups:/var/lib/postgresql/backups
    entrypoint: ["/usr/local/bin/custom-entrypoint.sh"]
    command: ["postgres"]
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        reservations:
          cpus: "0.5"
          memory: 512M
        limits:
          cpus: "1.0"
          memory: 1G
    labels:
      com.project.service: "postgres"
      com.project.environment: "dev"
      com.project.isolation-domain: "pg-dev"
      com.project.managed-by: "docker-compose"
    networks:
      pg_internal:
        ipv4_address: 172.20.1.2
      gateway:
    # Keep below memory limit (cgroup accounting includes /dev/shm)
    shm_size: 512mb
 
  postgres-replica:
    container_name: postgres-replica-dev
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../env/dev.env
    ports:
      - "5433:5432"
    volumes:
      - ${DATA_PATH_BASE}/pg_replica_data:/var/lib/postgresql/data
      - ../config/base/postgresql.conf:/etc/postgresql/base.conf:ro
      - ../config/dev/postgresql.conf:/etc/postgresql/override.conf:ro
      - ../scripts:/usr/local/bin/scripts:ro
    environment:
      - APP_ENV=dev
      - PG_MODE=replica
      - POSTGRES_MASTER_HOST=postgres
    entrypoint: ["/usr/local/bin/custom-entrypoint.sh"]
    command: ["postgres"]
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        reservations:
          cpus: "0.5"
          memory: 512M
        limits:
          cpus: "1.0"
          memory: 1G
    labels:
      com.project.service: "postgres-replica"
      com.project.environment: "dev"
      com.project.isolation-domain: "pg-dev"
      com.project.managed-by: "docker-compose"
    networks:
      pg_internal:
        ipv4_address: 172.20.1.3
      gateway:
    shm_size: 512mb
    depends_on:
      postgres:
        condition: service_healthy

networks:
  pg_internal:
    name: pg_internal_dev
    external: true
  gateway:
    name: gateway_dev_network
    external: true
