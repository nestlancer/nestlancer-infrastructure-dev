# ═══════════════════════════════════════════════════════════════
# Mailpit — Dev Environment Compose
# Simplified for dev-specific infrastructure
# ═══════════════════════════════════════════════════════════════
name: mailpit-dev

services:
  mailpit:
    container_name: mailpit-dev
    image: axllent/mailpit:v1.29.6
    env_file:
      - ../env/dev.env
    environment:
      - MP_UI_AUTH=${MAILPIT_UI_USER}:${MAILPIT_UI_PASS}
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    volumes:
      - ${DATA_PATH_BASE}:/data
    networks:
      mailpit_internal:
        ipv4_address: 172.20.7.2
      gateway:
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 1025 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        reservations:
          cpus: "0.2"
          memory: 128M
        limits:
          cpus: "0.5"
          memory: 256M
    labels:
      com.project.service: "mailpit"
      com.project.environment: "dev"
      com.project.managed-by: "docker-compose"
    restart: unless-stopped

networks:
  mailpit_internal:
    name: mailpit_internal_dev
    external: true
  gateway:
    name: gateway_dev_network
    external: true
